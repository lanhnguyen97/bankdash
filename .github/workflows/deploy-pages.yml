name: Deploy all three to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'bankdash-dashboard/**'
      - 'bankdash-vue/**'
      - 'bankdash-angular/**'
      - 'scripts/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            bankdash-dashboard/package-lock.json
            bankdash-vue/package-lock.json
            bankdash-angular/package-lock.json

      # Builds react/vue/angular with their /bankdash/<fw>/ base paths and
      # assembles site/ (landing + 404 + the three apps).
      - name: Build all three apps into site/
        run: node scripts/build-pages.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
