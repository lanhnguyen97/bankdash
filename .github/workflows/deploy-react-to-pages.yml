name: Deploy React to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'bankdash-dashboard/**'
      - '.github/workflows/deploy-react-to-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bankdash-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bankdash-dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Build with GH Pages base path
        run: npm run build -- --base=/bankdash/bankdash-dashboard/

      - name: Copy index.html to 404.html for SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: bankdash-dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
