<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BankDash</title>
    <!--
      Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      Pages serves this one 404.html for any path it can't find. We keep the first two
      segments (/<repo>/<framework>) and hand the rest to that app's index.html, which
      restores the real URL via the snippet in its <head>.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 2; // /<repo>/<framework>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
